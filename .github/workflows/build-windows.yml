name: Build Windows

on:
  push:
    branches: [main]
    paths:
      - 'Source/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.12

      - name: Download JUCE 8.0.12
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          curl -L https://github.com/juce-framework/JUCE/archive/refs/tags/8.0.12.zip -o juce.zip
          tar -xf juce.zip
          mv JUCE-8.0.12 JUCE

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}-juce-8.0.12

      - name: Configure
        run: |
          cmake -B build -S . `
            -G "Visual Studio 17 2022" -A x64 `
            -DJUCE_PATH="${{ github.workspace }}/JUCE" `
            -DJUCE_BUILD_EXAMPLES=OFF `
            -DJUCE_BUILD_EXTRAS=OFF

      - name: Build VST3 + Standalone
        run: cmake --build build --config Release --target Silo_VST3 Silo_Standalone -- /m

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Silo-VST3-Windows-x64
          path: build/Silo_artefacts/Release/VST3/
          if-no-files-found: error
          retention-days: 30

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: Silo-Standalone-Windows-x64
          path: build/Silo_artefacts/Release/Standalone/
          if-no-files-found: error
          retention-days: 30
