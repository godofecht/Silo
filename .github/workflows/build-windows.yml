name: Build Windows

on:
  push:
    branches: [main, master]
    paths:
      - 'Source/**'
      - 'CMakeLists.txt'
      - 'Assets/**'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Download JUCE 8.0.12
        run: |
          if (!(Test-Path "JUCE/CMakeLists.txt")) {
            curl -L https://github.com/juce-framework/JUCE/archive/refs/tags/8.0.12.zip -o juce.zip
            tar -xf juce.zip
            if (Test-Path "JUCE") { Remove-Item -Recurse -Force JUCE }
            Rename-Item JUCE-8.0.12 JUCE
          }

      - name: Configure
        run: |
          cmake -B build -S . `
            -G "Visual Studio 17 2022" -A x64 `
            -DJUCE_PATH="${{ github.workspace }}/JUCE" `
            -DJUCE_BUILD_EXAMPLES=OFF `
            -DJUCE_BUILD_EXTRAS=OFF

      - name: Build VST3 + Standalone
        run: cmake --build build --config Release --target Silo_VST3 Silo_Standalone -- /m

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Silo-VST3-Windows-x64
          path: build/Silo_artefacts/Release/VST3/
          if-no-files-found: error
          retention-days: 30

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: Silo-Standalone-Windows-x64
          path: build/Silo_artefacts/Release/Standalone/
          if-no-files-found: error
          retention-days: 30
